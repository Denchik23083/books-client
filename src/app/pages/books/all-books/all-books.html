<div class="page">
  <div class="container">
    <div class="header">
        <h1>Список книг</h1>
        <div class="actions">
          @if (isAdmin()) {
            <button class="add" (click)="addBook()">Добавить</button>
          }
          <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <div class="grid">
      @for (book of books(); track book.id) {
        <div class="card" (click)="details(book.id)">
          <h3>{{ book.title }}</h3>
          <p class="author">{{ book.author }}</p>

          <div class="meta">
            <span>{{ book.pagesCount }} стр.</span>
            <span>{{ book.publishDate | date }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
