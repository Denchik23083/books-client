<div class="page">
  <div class="container">
    <div class="header">
        <h1>Книга</h1>
        <div class="actions">
            <button class="back" (click)="back()">Назад</button>
            <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    @if (!isLoading() && !errorMessage() && book()) {
      <div class="card">
        <h2>{{ book()!.title }}</h2>
        <p class="author">{{ book()!.author }}</p>

        <div class="meta">
          <span>{{ book()!.pagesCount }} стр.</span>
          <span>{{ book()!.publishDate | date:'dd.MM.yyyy' }}</span>
        </div>

        @if (isAdmin()) {
          <div class="card-actions">
            <button class="edit" (click)="edit()">Редактировать</button>
            <button class="delete" (click)="delete()">Удалить</button>
          </div>
        }
      </div>
    }
  </div>
</div>
